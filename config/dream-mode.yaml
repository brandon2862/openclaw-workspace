# 💤 Dream Mode 记忆增强系统

> 基于 Claude Code 梦境模式设计
> 创建时间: 2026-04-08

---

## 四阶段处理流程

### 1. Orient (定位)

**目标**: 了解当前状态和环境

- 扫描 `memory/*.md` 文件列表
- 检查 `MEMORY.md` 当前大小
- 识别需要整理的时间范围
- 确定处理优先级

### 2. Gather (收集)

**目标**: 从每日记忆中提取关键信息

- 遍历 `memory/YYYY-MM-DD.md` 文件
- 提取以下类型信息:
  - ✅ 重要决策和结果
  - 📝 学到的教训
  - 🔧 技术配置/变更
  - 👤 用户偏好和习惯
  - 🚀 项目进展和里程碑
  - ⚠️ 错误和解决方案

### 3. Consolidate (整合)

**目标**: 消除矛盾，合并重复

- 日期格式统一为 `YYYY-MM-DD`
- 相对日期转绝对日期（"昨天" → 具体日期）
- 删除重复信息
- 解决矛盾记录（保留最新的）
- 合并相似条目

### 4. Prune (修剪)

**目标**: 清理过期信息，保持精简

- MEMORY.md 保持在 25KB 以下
- 删除 30 天以上的每日记忆
- 压缩冗余描述
- 只保留有价值的信息

---

## 触发条件

| 条件 | 动作 |
|------|------|
| 心跳检查时 | 轻量扫描，跳过完整处理 |
| 空闲时 | 完整 Dream Mode 处理 |
| 手动触发 | 强制执行完整处理 |
| MEMORY.md > 20KB | 压缩处理 |

---

## 文件结构

```
~/.openclaw/workspace/
├── MEMORY.md                    # 长期记忆索引 (保持 < 25KB)
├── memory/                      # 每日记忆文件
│   ├── YYYY-MM-DD.md           # 当日记录
│   ├── YYYY-MM-DD-HHMM.md     # 事件记录
│   └── daily-stock-*.md       # 专题记录
└── data/
    └── dream-state.json        # Dream Mode 状态
```

---

## 输出格式

### MEMORY.md 结构

```markdown
# 🧠 MEMORY.md - 长期记忆

## 👤 用户信息
[基本信息]

## 🚀 框架集成
[框架状态和能力]

## 📚 重要项目
[活跃项目摘要]

## 🏗️ 近期成就
[最近30天的关键成果]

## ⚠️ 重要提醒
[安全规则和注意事项]

## 📅 更新历史
[更新记录]
```

---

## 自动清理规则

- **30天以上**: 删除 `memory/YYYY-MM-DD.md`（已整合到MEMORY.md的）
- **专题文件**: 保留（如 market-research-*.md）
- **压缩文件**: 保留（.compressed.md）
- **备份**: 自动备份到 data/dream-backup/

