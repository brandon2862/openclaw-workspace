# 🔄 静态/动态提示分离系统

> 基于 Claude Code 的 prompt cache 优化
> 实现时间: 2026-04-08

---

## 概念说明

Claude Code 通过 `__SYSTEM_PROMPT_DYNAMIC_BOUNDARY__` 将系统提示分为两部分：

```
┌─────────────────────────────────────────────┐
│  静态部分 (Static)                          │ ← 缓存全局，可重复使用
│  - AGENTS.md                               │
│  - SOUL.md                                 │
│  - USER.md (用户基本信息)                   │
│  - IDENTITY.md                             │
├─────────────────────────────────────────────┤
│  动态边界 (BOUNDARY)                        │
├─────────────────────────────────────────────┤
│  动态部分 (Dynamic)                         │ ← 每次请求重新计算
│  - 记忆 (memory)                           │
│  - MCP 服务                                │
│  - 语言设置                                │
│  - 当前会话上下文                          │
│  - 项目特定信息                            │
└─────────────────────────────────────────────┘
```

---

## 优化效果

| 指标 | 优化前 | 优化后 |
|------|--------|--------|
| 重复请求Token | 全量发送 | 仅动态部分 |
| 缓存命中率 | ~0% | ~70%+ |
| API成本 | 100% | ~50% |

---

## 实现方案

### 1. 静态部分识别

```yaml
static_files:
  - path: "AGENTS.md"
    description: "工作规则和流程"
    cache_key: "workspace_rules"
  - path: "SOUL.md"
    description: "人格定义"
    cache_key: "agent_persona"
  - path: "USER.md"
    description: "用户基本信息"
    cache_key: "user_basic"
  - path: "IDENTITY.md"
    description: "AI身份定义"
    cache_key: "agent_identity"
  - path: "MEMORY.md"
    description: "长期记忆摘要"
    cache_key: "longterm_memory"
```

### 2. 动态部分识别

```yaml
dynamic_content:
  - memory/today.md        # 每日记忆
  - memory/daily-*.md      # 当日专题
  - config/runtime.yaml   # 运行时配置
  - MCP servers           # 当前MCP服务
  - session history       # 当前会话历史
```

### 3. 缓存策略

```yaml
cache:
  enabled: true
  storage: "data/prompt-cache/"
  max_age: 3600           # 1小时
  invalidate_on:
    - "USER.md changed"
    - "AGENTS.md changed"
    - "SOUL.md changed"
    - "IDENTITY.md changed"
```

---

## 文件结构

```
~/.openclaw/workspace/
├── AGENTS.md                 # 静态 - 工作规则
├── SOUL.md                   # 静态 - 人格定义
├── USER.md                   # 静态 - 用户信息
├── IDENTITY.md               # 静态 - AI身份
├── MEMORY.md                 # 静态 - 长期记忆
├── config/
│   ├── prompt-cache.yaml     # 缓存配置
│   └── static-parts.yaml     # 静态文件定义
└── data/
    └── prompt-cache/         # 缓存存储
        ├── manifest.json    # 缓存清单
        └── *.cache          # 缓存文件
```

