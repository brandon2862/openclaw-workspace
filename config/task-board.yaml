## 实现方案

### 1. 任务板存储

```json
// data/task-board/manifest.json
{
  "version": "1.0",
  "tasks": [
    {
      "id": "task-001",
      "type": "explorer",
      "title": "搜索代码库",
      "description": "查找使用React的组件",
      "status": "pending",
      "priority": "medium",
      "created_at": "2026-04-08T10:00:00Z",
      "assigned_agent": null,
      "result": null
    }
  ],
  "agents": [
    {
      "id": "agent-001",
      "type": "explorer",
      "status": "idle",
      "current_task": null
    }
  ]
}
```

### 2. Agent类型配置

```yaml
agent_types:
  explorer:
    allowed_tools:
      - read
      - glob
      - grep
      - web_search
      - web_fetch
    timeout: 300
    model: "xiaomi/mimo-v2-flash"
    
  planner:
    allowed_tools:
      - read
      - memory_search
    timeout: 600
    model: "minimax/MiniMax-M2.5"
    
  worker:
    allowed_tools:
      - read
      - write
      - edit
      - exec
      - sessions_spawn
    timeout: 1800
    model: "minimax/MiniMax-M2.5"
    
  guide:
    allowed_tools:
      - read
      - memory_search
      - web_search
    timeout: 300
    model: "xiaomi/mimo-v2-flash"
```

### 3. 任务分配逻辑

```python
def assign_task(task, available_agents):
    # 按类型匹配
    suitable_agents = [a for a in available_agents if a.type == task.type]
    
    # 选择最空闲的
    if suitable_agents:
        return min(suitable_agents, key=lambda a: a.busy_score)
    
    # 无合适agent，排队等待
    return None
```

---

## 使用示例

```bash
# 创建任务
python task-board.py create --type explorer --title "搜索API代码"

# 查看任务板
python task-board.py list

# 执行任务
python task-board.py run task-001
```

