# 👥 多Agent任务板系统

> 基于 Claude Code 的多Agent编排设计
> 实现时间: 2026-04-08

---

## 概念说明

Claude Code 的多Agent系统通过**共享任务板**协调：
- 不直接调用，而是通过任务列表通信
- 支持不同能力的Agent（只读 vs 完整权限）
- 跨机器通过 Unix Domain Socket 通信

---

## Agent类型

| 类型 | 能力 | 用途 |
|------|------|------|
| **explorer** | 只读工具 | 快速代码搜索、文件发现 |
| **planner** | 只读工具 | 设计实现方案、任务分解 |
| **worker** | 完整工具 | 执行具体任务 |
| **guide** | 只读+文档 | 回答问题、提供指导 |

---

## 任务板设计

```yaml
task_board:
  enabled: true
  storage: "data/task-board/"
  
  # 任务状态
  states:
    - pending     # 待处理
    - running     # 执行中
    - completed   # 完成
    - failed      # 失败
    
  # 任务优先级
  priority:
    high: 1
    medium: 2
    low: 3
```

