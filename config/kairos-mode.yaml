## 集成说明

KAIROS 模式通过 heartbeat 机制实现：

```python
# 在 heartbeat 检查中
if kairos_enabled:
    # 主动检查
    check_task_status()      # 检查任务状态
    check_memory_usage()     # 检查记忆使用
    check_context_level()    # 检查上下文
    check_scheduled_tasks()  # 检查定时任务
    
    # 发现问题主动通知
    if issues_found:
        send_notification(issues)
```

