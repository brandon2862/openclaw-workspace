## 实现说明

### 权限检查流程

```
1. 用户发送请求
2. 识别工具类型
3. 检查权限等级
4. L0 → 直接执行
5. L1 → 检查是否首次，是则确认，否则执行
6. L2 → 每次确认
7. L3 → 阻止并警告
```

### 首次确认机制

- 记录每个(L1)工具的首次使用时间
- 首次使用需要用户确认
- 确认后记录到信任列表
- 信任列表可被用户清空

---

## 安全规则

### 危险命令模式识别

```yaml
dangerous_patterns:
  exec:
    - "rm -rf"
    - "dd if="
    - "mkfs"
    - "> /dev/sd"
    - "chmod -R 777"
    - "chown -R"
  git:
    - "git push --force"
    - "git push --delete"
    - "git reset --hard"
  database:
    - "DROP TABLE"
    - "DELETE FROM.*WHERE"
    - "TRUNCATE"
```

