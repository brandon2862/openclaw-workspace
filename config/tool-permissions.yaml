## 权限模式

### 模式说明

| 模式 | 描述 | L0 | L1 | L2 | L3 |
|------|------|----|----|----|----|
| **ask** | 询问模式(默认) | ✅ | ❌→✅ | ❌ | ❌ |
| **auto** | 智能模式(开发中) | ✅ | ✅ | ❌ | ❌ |
| **bypass** | 信任模式 | ✅ | ✅ | ✅ | ❌ |
| **strict** | 严格模式 | ✅ | ❌ | ❌ | ❌ |

### 当前配置

```yaml
current_mode: "ask"  # 默认询问模式
```

