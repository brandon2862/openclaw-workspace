# 🛡️ 工具权限四级分类系统

> 基于 Claude Code 权限模型增强
> 创建时间: 2026-04-08

---

## 权限等级说明

| 等级 | 名称 | 行为 | 风险 | 示例工具 |
|------|------|------|------|---------|
| **L0** | Always | 自动允许 | 无 | read, glob, grep, web_search, web_fetch |
| **L1** | First-Confirm | 首次确认后自动允许 | 低 | write, edit, task_create, task_list |
| **L2** | Always-Confirm | 每次都需确认 | 中 | exec, git_push, ssh, network_calls |
| **L3** | Block | 阻止并警告 | 高 | rm_rf, drop_table, system_config |

---

## 工具权限映射

### L0 - Always (自动允许)

```yaml
tools:
  - read              # 读取文件
  - glob              # 文件搜索
  - grep              # 内容搜索
  - web_search        # 网络搜索
  - web_fetch         # 获取网页
  - memory_search     # 记忆搜索
  - memory_get        # 读取记忆
  - image             # 图片分析
  - session_status    # 会话状态
  - cron_list         # 查看定时任务
  - nodes_status      # 节点状态
```

### L1 - First-Confirm (首次确认)

```yaml
tools:
  - write             # 写入文件
  - edit             # 编辑文件
  - task_create      # 创建任务
  - task_list        # 列表任务
  - task_get         # 获取任务
  - sessions_spawn   # 启动子agent
  - sessions_send    # 发送消息
  - tts              # 文字转语音
  - image_generate   # 图片生成
  - message_send     # 发送消息(需配置channel)
```

### L2 - Always-Confirm (每次确认)

```yaml
tools:
  - exec             # 执行命令
  - git_push         # Git推送
  - git_force        # 强制推送
  - ssh              # SSH连接
  - crontab          # 定时任务管理
  - gateway_config   # 网关配置
  - config_apply     # 应用配置
  - config_patch     # 补丁配置
  - browser          # 浏览器控制
  - process          # 进程管理
```

### L3 - Block (阻止)

```yaml
tools:
  - rm_rf            # 递归删除
  - drop_database    # 删除数据库
  - system_reboot    # 系统重启
  - system_shutdown  # 系统关机
  - format_disk      # 格式化磁盘
  - kill_system      # 杀死系统进程
  - firewall_config  # 防火墙配置
  - user_create      # 创建用户
  - user_delete      # 删除用户
  - chmod_777        # 危险权限修改
```

