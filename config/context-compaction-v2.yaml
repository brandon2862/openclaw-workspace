# 📦 上下文压缩五层策略

> 基于 Claude Code 的上下文管理优化
> 实现时间: 2026-04-08

---

## 五层压缩策略

Claude Code 使用多层压缩策略来管理上下文：

| 层级 | 名称 | 触发条件 | 动作 |
|------|------|----------|------|
| L1 | Micro Compact | 每次工具调用后 | 清理旧工具输出 |
| L2 | Auto Compact | tokens > 80% | 总结+保留最近3轮 |
| L3 | Session Memory | 每10轮 | 提取关键信息到文件 |
| L4 | Full Compact | tokens > 95% | 压缩整个对话历史 |
| L5 | Truncate | 最后手段 | 丢弃最旧消息组 |

---

## 各层详细说明

### L1: Micro Compact

**触发**: 每次 tool_use 后

**动作**:
- 清理旧 tool_result 内容（保留结构）
- 只保留最近 3 轮 (user + assistant)
- 删除超过 5000 字符的输出

```python
def micro_compact(messages):
    for msg in messages[:-6]:  # 保留最近3轮
        if msg.type == 'tool_result':
            msg.content = truncate(msg.content, 1000)
```

### L2: Auto Compact

**触发**: context_tokens > 160,000 (80% of 200K)

**动作**:
- 总结对话片段
- 保留最近 3 轮完整消息
- 压缩中间历史
- 保持关键文件上下文

```python
def auto_compact(messages):
    recent = messages[-6:]  # 最近3轮
    middle = messages[:-6]  # 中间部分
    summary = summarize(middle)
    return recent + [summary]
```

### L3: Session Memory

**触发**: 每 10 轮对话

**动作**:
- 提取关键信息：
  - 重要决策和结果
  - 文件变更
  - 用户偏好
  - 错误和解决方案
- 保存到 memory/ 目录
- 清理已保存的会话部分

```python
def session_memory_compact(messages):
    key_info = extract_key_info(messages)
    save_to_memory(key_info)
    return truncate_messages(messages, keep_recent=10)
```

### L4: Full Compact

**触发**: tokens > 190,000 (95%)

**动作**:
- 压缩整个对话为摘要
- 保留：摘要 + MEMORY.md + 活跃文件 + 当前计划
- 预算: 50,000 tokens

```python
def full_compact(messages):
    summary = full_summarize(messages)
    return {
        "summary": summary,
        "memory": read(MEMORY.md),
        "active_files": get_active_files(),
        "current_plan": get_current_plan(),
    }
```

### L5: Truncate

**触发**: tokens > 195,000 (接近满)

**动作**:
- 丢弃最旧的消息组
- 保留最重要的上下文
- 最后手段

```python
def truncate(messages):
    # 保留最近的系统提示 + 用户最近消息
    system = messages[0]  # system prompt
    recent = messages[-10:]  # 最近10条
    return [system] + recent
```

