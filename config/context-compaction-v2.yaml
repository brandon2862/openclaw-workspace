## 压缩效果对比

| 策略 | tokens保留 | 压缩率 | 丢失风险 |
|------|-----------|--------|---------|
| Micro | 90% | 10% | 无 |
| Auto | 60% | 40% | 低 |
| Session | 40% | 60% | 中 |
| Full | 25% | 75% | 中高 |
| Truncate | 15% | 85% | 高 |

