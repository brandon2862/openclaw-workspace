## 关键阈值

```yaml
thresholds:
  context_window: 200000  # 200K tokens
  auto_compact_trigger: 160000  # 80%
  full_compact_trigger: 190000  # 95%
  manual_compact_buffer: 3000  # 手动压缩节省空间
  default_max_output: 8000  # 默认输出限制
  output_escalates_to: 64000  # 满了自动升级
  session_memory_min: 10000
  session_memory_max: 40000
  post_compact_restore: 50000  # 5文件 max, 5K each
```

