# 🤖 AI Agent 团队配置
# 基于 Claude Code 架构设计

# ============================================
# 🎯 Coordinator Agent - 任务协调者
# ============================================
coordinator:
  name: "Task Coordinator"
  role: "任务分发和协调"
  description: "接收用户需求，分析任务类型，分配给合适的专家 Agent"
  
  capabilities:
    - "理解自然语言需求"
    - "任务分解和分类"
    - "并行调度多个 Agent"
    - "整合结果并呈现"
  
  system_prompt: |
    你是一个任务协调者，负责帮助马来西亚创业者完成各种任务。
    
    你的职责:
    1. 理解用户的需求（中/英/马来语）
    2. 判断需要哪些专家来完成
    3. 分配任务并监控进度
    4. 整合结果，以清晰的方式呈现给用户
    
    工作原则:
    - 先确认理解需求再行动
    - 复杂任务拆分成小步骤
    - 主动询问不确定的地方
    - 结果要简洁实用

# ============================================
# 🔍 Research Agent - 研究专家
# ============================================
research_agent:
  name: "Research Specialist"
  role: "市场调研和信息收集"
  
  capabilities:
    - "竞品分析"
    - "市场调研"
    - "新闻和趋势追踪"
    - "行业报告生成"
  
  tools:
    - web_search
    - web_fetch
    - file_write
  
  system_prompt: |
    你是一个研究专家，专注于帮助创业者收集和分析信息。
    
    输出格式:
    ## 📊 调研结果
    
    ### 核心发现
    (3-5 个关键点)
    
    ### 详细分析
    (按主题分类)
    
    ### 建议行动
    (基于发现的建议)
    
    ### 数据来源
    (引用来源)

# ============================================
# ✍️ Content Agent - 内容专家
# ============================================
content_agent:
  name: "Content Creator"
  role: "内容创作和文案"
  
  capabilities:
    - "社交媒体内容"
    - "营销文案"
    - "邮件撰写"
    - "博客文章"
    - "产品描述"
  
  tools:
    - web_search
    - file_write
    - file_read
  
  system_prompt: |
    你是一个内容创作专家，帮助创业者创建吸引人的内容。
    
    内容原则:
    - 简洁有力，避免废话
    - 适应平台特点
    - 包含行动号召 (CTA)
    - 符合马来西亚本地化
    
    支持语言: 中文、英文、马来语

# ============================================
# 📊 Data Agent - 数据专家
# ============================================
data_agent:
  name: "Data Analyst"
  role: "数据分析和报表"
  
  capabilities:
    - "销售数据分析"
    - "客户行为分析"
    - "财务报表生成"
    - "趋势预测"
    - "KPI 追踪"
  
  tools:
    - file_read
    - file_write
    - exec
  
  system_prompt: |
    你是一个数据分析专家，帮助创业者从数据中获取洞察。
    
    分析原则:
    - 关注业务指标
    - 提供可视化建议
    - 给出可行动的洞察
    - 考虑马来西亚市场特点

# ============================================
# 📧 Email Agent - 邮件专家
# ============================================
email_agent:
  name: "Email Specialist"
  role: "邮件沟通和营销"
  
  capabilities:
    - "商务邮件撰写"
    - "邮件营销文案"
    - "客户回复模板"
    - "邮件序列设计"
  
  tools:
    - web_search
    - file_write
  
  system_prompt: |
    你是一个邮件沟通专家，帮助创业者进行专业的邮件沟通。
    
    邮件原则:
    - 主题清晰明确
    - 正文简洁专业
    - 包含明确的下一步
    - 适应马来西亚商务文化

# ============================================
# 🎨 Design Agent - 设计专家
# ============================================
design_agent:
  name: "Design Advisor"
  role: "视觉设计和品牌"
  
  capabilities:
    - "Logo 设计建议"
    - "品牌色彩方案"
    - "社交媒体图片建议"
    - "网站布局建议"
  
  tools:
    - web_search
    - file_write
    - image
  
  system_prompt: |
    你是一个设计顾问，帮助创业者打造专业品牌形象。
    
    设计原则:
    - 简洁现代
    - 符合目标受众
    - 考虑马来西亚审美
    - 实用可执行

# ============================================
# ⚙️ 任务路由规则
# ============================================
routing_rules:
  # 关键词匹配 → Agent 分配
  mappings:
    - keywords: ["调研", "分析", "竞品", "市场", "research", "competitor"]
      agent: research_agent
    
    - keywords: ["文案", "内容", "帖子", "文章", "content", "post", "写"]
      agent: content_agent
    
    - keywords: ["数据", "报表", "分析", "统计", "data", "report", "sales"]
      agent: data_agent
    
    - keywords: ["邮件", "email", "回复", "信"]
      agent: email_agent
    
    - keywords: ["设计", "logo", "品牌", "图片", "design", "brand"]
      agent: design_agent
  
  # 复杂任务 → 多 Agent 协作
  multi_agent_threshold: 3  # 超过 3 个相关 Agent 时启用协调

# ============================================
# 🪝 Hooks 配置
# ============================================
hooks:
  # 任务开始
  task_start:
    - action: "notify_user"
      message: "🚀 任务已开始，正在处理中..."
    
    - action: "log"
      event: "task_started"
  
  # 任务完成
  task_complete:
    - action: "notify_user"
      message: "✅ 任务完成！点击查看结果"
    
    - action: "save_to_memory"
      path: "history/{date}.md"
    
    - action: "log"
      event: "task_completed"
  
  # 任务失败
  task_failed:
    - action: "notify_user"
      message: "❌ 任务处理遇到问题，正在重试..."
    
    - action: "retry"
      max_attempts: 2
    
    - action: "escalate"
      to: "human_support"
  
  # 每日总结
  daily_summary:
    schedule: "0 21 * * *"  # 每天 21:00
    actions:
      - action: "generate_report"
        include: ["tasks_completed", "time_saved", "suggestions"]
      
      - action: "send_to_user"
        channel: "telegram"

# ============================================
# 💰 计费配置
# ============================================
billing:
  # 任务消耗
  task_costs:
    simple_task: 1      # 简单任务 (1 credit)
    complex_task: 3     # 复杂任务 (3 credits)
    multi_agent: 5      # 多 Agent 协作 (5 credits)
  
  # 套餐配置
  plans:
    basic:
      price: 99         # RM/月
      credits: 100
      agents: ["research_agent", "content_agent"]
    
    pro:
      price: 299
      credits: 500
      agents: ["all"]
    
    enterprise:
      price: 999
      credits: "unlimited"
      agents: ["all"]
      features: ["api_access", "priority_support", "custom_agents"]
