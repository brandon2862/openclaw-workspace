<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI创业诊断问卷 | 问题1-15</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .progress-bar {
            height: 8px;
            background: rgba(255,255,255,0.3);
            border-radius: 4px;
            margin: 20px 0;
            overflow: hidden;
        }
        
        .progress {
            height: 100%;
            background: #10b981;
            width: 7%; /* 从7%开始，第一个问题 */
            transition: width 0.3s ease;
        }
        
        .question-counter {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        .content {
            padding: 40px 30px;
        }
        
        .question {
            margin-bottom: 40px;
            display: none;
        }
        
        .question.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .question h2 {
            color: #4f46e5;
            margin-bottom: 25px;
            font-size: 1.5rem;
        }
        
        .options {
            display: grid;
            gap: 15px;
        }
        
        .option {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 18px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
        }
        
        .option:hover {
            border-color: #4f46e5;
            background: #f0f9ff;
            transform: translateY(-2px);
        }
        
        .option.selected {
            border-color: #10b981;
            background: #f0fdf4;
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.2);
        }
        
        .option input[type="checkbox"],
        .option input[type="radio"] {
            margin-right: 15px;
            transform: scale(1.2);
        }
        
        .option label {
            cursor: pointer;
            flex: 1;
            font-size: 1.1rem;
        }
        
        .text-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1.1rem;
            transition: border-color 0.3s ease;
        }
        
        .text-input:focus {
            outline: none;
            border-color: #4f46e5;
        }
        
        .navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #e2e8f0;
        }
        
        .nav-button {
            padding: 14px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .prev-button {
            background: #f1f5f9;
            color: #475569;
        }
        
        .prev-button:hover {
            background: #e2e8f0;
        }
        
        .next-button {
            background: #4f46e5;
            color: white;
        }
        
        .next-button:hover {
            background: #4338ca;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.4);
        }
        
        .submit-button {
            background: #10b981;
            color: white;
            padding: 16px 40px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            display: none;
        }
        
        .submit-button:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4);
        }
        
        .footer {
            background: #1e293b;
            color: white;
            text-align: center;
            padding: 25px;
            margin-top: 40px;
        }
        
        .footer p {
            opacity: 0.8;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }
        
        @media (max-width: 768px) {
            .content {
                padding: 30px 20px;
            }
            
            .question h2 {
                font-size: 1.3rem;
            }
            
            .option {
                padding: 15px;
            }
            
            .nav-button {
                padding: 12px 25px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AI创业诊断问卷</h1>
            <div class="progress-bar">
                <div class="progress" id="progress"></div>
            </div>
            <div class="question-counter">
                <span id="current-question">1</span> / 15
            </div>
        </div>
        
        <div class="content">
            <form id="diagnosis-form">
                <!-- 问题1 -->
                <div class="question active" id="q1">
                    <h2>1. 你的创业项目属于哪个领域？</h2>
                    <div class="options">
                        <div class="option">
                            <input type="radio" id="q1a1" name="q1" value="电商/零售">
                            <label for="q1a1">电商/零售</label>
                        </div>
                        <div class="option">
                            <input type="radio" id="q1a2" name="q1" value="内容创作/媒体">
                            <label for="q1a2">内容创作/媒体</label>
                        </div>
                        <div class="option">
                            <input type="radio" id="q1a3" name="q1" value="服务业（咨询、教育、健康等）">
                            <label for="q1a3">服务业（咨询、教育、健康等）</label>
                        </div>
                        <div class="option">
                            <input type="radio" id="q1a4" name="q1" value="科技/软件开发">
                            <label for="q1a4">科技/软件开发</label>
                        </div>
                        <div class="option">
                            <input type="radio" id="q1a5" name="q1" value="制造业/实体产品">
                            <label for="q1a5">制造业/实体产品</label>
                        </div>
                        <div class="option">
                            <input type="radio" id="q1a6" name="q1" value="其他">
                            <label for="q1a6">其他：</label>
                            <input type="text" class="text-input" id="q1-other" placeholder="请说明" style="margin-left: 10px; flex: 1;">
                        </div>
                    </div>
                </div>
                
                <!-- 问题2 -->
                <div class="question" id="q2">
                    <h2>2. 你的创业目前处于哪个阶段？</h2>
                    <div class="options">
                        <div class="option">
                            <input type="radio" id="q2a1" name="q2" value="想法验证期（有想法，还没开始）">
                            <label for="q2a1">想法验证期（有想法，还没开始）</label>
                        </div>
                        <div class="option">
                            <input type="radio" id="q2a2" name="q2" value="启动期（已开始，0-1年）">
                            <label for="q2a2">启动期（已开始，0-1年）</label>
                        </div>
                        <div class="option">
                            <input type="radio" id="q2a3" name="q2" value="成长期（1-3年，有稳定收入）">
                            <label for="q2a3">成长期（1-3年，有稳定收入）</label>
                        </div>
                        <div class="option">
                            <input type="radio" id="q2a4" name="q2" value="扩张期（3年以上，寻求规模化）">
                            <label for="q2a4">扩张期（3年以上，寻求规模化）</label>
                        </div>
                    </div>
                </div>
                
                <!-- 问题3 -->
                <div class="question" id="q3">
                    <h2>3. 你的团队规模是？</h2>
                    <div class="options">
                        <div class="option">
                            <input type="radio" id="q3a1" name="q3" value="单人创业">
                            <label for="q3a1">单人创业</label>
                        </div>
                        <div class="option">
                            <input type="radio" id="q3a2" name="q3" value="2-5人团队">
                            <label for="q3a2">2-5人团队</label>
                        </div>
                        <div class="option">
                            <input type="radio" id="q3a3" name="q3" value="6-10人团队">
                            <label for="q3a3">6-10人团队</label>
                        </div>
                        <div class="option">
                            <input type="radio" id="q3a4" name="q3" value="10人以上">
                            <label for="q3a4">10人以上</label>
                        </div>
                    </div>
                </div>
                
                <!-- 问题4 -->
                <div class="question" id="q4">
                    <h2>4. 你的主要目标是什么？（可多选）</h2>
                    <div class="options">
                        <div class="option">
                            <input type="checkbox" id="q4a1" name="q4" value="验证商业模式">
                            <label for="q4a1">验证商业模式</label>
                        </div>
                        <div class="option">
                            <input type="checkbox" id="q4a2" name="q4" value="获取第一批客户">
                            <label for="q4a2">获取第一批客户</label>
                        </div>
                        <div class="option">
                            <input type="checkbox" id="q4a3" name="q4" value="提升运营效率">
                            <label for="q4a3">提升运营效率</label>
                        </div>
                        <div class="option">
                            <input type="checkbox" id="q4a4" name="q4" value="增加收入/利润">
                            <label for="q4a4">增加收入/利润</label>
                        </div>
                        <div class="option">
                            <input type="checkbox" id="q4a5" name="q4" value="扩大团队规模">
                            <label for="q4a5">扩大团队规模</label>
                        </div>
                        <div class="option">
                            <input type="checkbox" id="q4a6" name="q4" value="准备融资">
                            <label for="q4a6">准备融资</label>
                        </div>
                    </div>
                </div>
                
                <!-- 问题5 -->
                <div class="question" id="q5">
                    <h2>5. 你对AI工具的了解程度如何？</h2>
                    <div class="options">
                        <div class="option">
                            <input type="radio" id="q5a1" name="q5" value="完全不了解">
                            <label for="q5a1">完全不了解</label>
                        </div>
                        <div class="option">
                            <input type="radio" id="q5a2" name="q5" value="听说过但没用过">
                            <label for="q5a2">听说过但没用过</label>
                        </div>
                        <div class="option">
                            <input type="radio" id="q5a3" name="q5" value="偶尔使用（如ChatGPT）">
                            <label for="q5a3">偶尔使用（如ChatGPT）</label>
                        </div>
                        <div class="option">
                            <input type="radio" id="q5a4" name="q5" value="经常使用多种AI工具">
                            <label for="q5a4">经常使用多种AI工具</label>
                        </div>
                        <div class="option">
                            <input type="radio" id="q5a5" name="q5" value="深度使用，有定制需求">
                            <label for="q5a5">深度使用，有定制需求</label>
                        </div>
                    </div>
                </div>
                
                <!-- 问题6-15的HTML结构类似，为了简洁这里省略 -->
                <!-- 实际使用时需要补充完整 -->
                
                <div class="navigation">
                    <button type="button" class="nav-button prev-button" id="prev-btn" disabled>上一题</button>
                    <button type="button" class="nav-button next-button" id="next-btn">下一题</button>
                    <button type="submit" class="submit-button" id="submit-btn">生成诊断报告</button>
                </div>
            </form>
        </div>
        
        <div class="footer">
            <p>© 2026 AI创业诊断 | 专为马来西亚中文创业者设计</p>
            <p>你的回答将用于生成个性化AI应用建议，我们尊重你的隐私</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const questions = document.querySelectorAll('.question');
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            const submitBtn = document.getElementById('submit-btn');
            const progressBar = document.getElementById('progress');
            const currentQuestionSpan = document.getElementById('current-question');
            
            let currentQuestion = 0;
            const totalQuestions = 15; // 实际应该是15
            
            // 更新进度和按钮状态
            function updateUI() {
                // 更新进度条
                const progress = ((currentQuestion + 1) / totalQuestions) * 100;
                progressBar.style.width = `${progress}%`;
                
                // 更新问题计数器
                currentQuestionSpan.textContent = currentQuestion + 1;
                
                // 显示/隐藏问题
                questions.forEach((q, index) => {
                    q.classList.toggle('active', index === currentQuestion);
                });
                
                // 更新按钮状态
                prevBtn.disabled = currentQuestion === 0;
                
                if (currentQuestion === totalQuestions - 1) {
                    nextBtn.style.display = 'none';
                    submitBtn.style.display = 'block';
                } else {
                    nextBtn.style.display = 'block';
                    submitBtn.style.display = 'none';
                }
                
                // 添加选项选择效果
                document.querySelectorAll('.option').forEach(option => {
                    const input = option.querySelector('input');
                    if (input) {
                        option.classList.toggle('selected', input.checked);
                        
                        // 点击选项时选择
                        option.addEventListener('click', function(e) {
                            if (e.target.tagName === 'INPUT') return;
                            
                            const input = this.querySelector('input');
                            if (input.type === 'radio') {
                                // 单选：取消同组其他选项
                                const name = input.name;
                                document.querySelectorAll(`input[name="${name}"]`).forEach(inp => {
                                    inp.checked = false;
                                    inp.parentElement.classList.remove('selected');
                                });
                                input.checked = true;
                            } else if (input.type === 'checkbox') {
                                input.checked = !input.checked;
                            }
                            
                            this.classList.toggle('selected', input.checked);
                        });
                    }
                });
            }
            
            // 上一题
            prevBtn.addEventListener('click', function() {
                if (currentQuestion > 0) {
                    currentQuestion--;
                    updateUI();
                }
            });
            
            // 下一题
            nextBtn.addEventListener('click', function() {
                // 简单验证当前问题是否已回答
                const currentQuestionEl = questions[currentQuestion];
                const inputs = currentQuestionEl.querySelectorAll('input[type="radio"]:checked, input
