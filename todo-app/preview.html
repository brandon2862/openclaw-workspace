<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待办事项应用 - 预览</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .form-input {
            width: 100%;
            padding: 0.5rem 1rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
        }
        .form-input:focus {
            outline: none;
            ring: 2px;
            --tw-ring-color: #3b82f6;
        }
        .btn {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn:hover {
            transform: scale(0.98);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-md">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <h1 class="text-2xl font-bold text-blue-600">
                    <i class="fas fa-tasks mr-2"></i>待办事项应用
                </h1>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <div class="max-w-md mx-auto">
            <div class="bg-white rounded-lg shadow-lg p-6">
                <h2 class="text-xl font-bold mb-6 text-center">登录</h2>
                
                <form class="space-y-4">
                    <div>
                        <label class="block text-gray-700 mb-2">邮箱</label>
                        <input type="email" class="form-input" placeholder="请输入邮箱" value="test@example.com">
                    </div>
                    
                    <div>
                        <label class="block text-gray-700 mb-2">密码</label>
                        <input type="password" class="form-input" placeholder="请输入密码" value="password123">
                    </div>
                    
                    <button type="button" class="btn w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600">
                        登录
                    </button>
                </form>
                
                <p class="mt-4 text-center text-gray-600">
                    还没有账号？
                    <button class="text-blue-500 hover:underline">立即注册</button>
                </p>
            </div>
        </div>
    </main>
</body>
</html>
